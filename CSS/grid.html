<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style> 
    .box{
        background-color: cadetblue;
        height: 20px;
        width: 20px;

    }
    .container{
        display: grid;
        grid-template-columns:1fr 2fr 3fr ;
        gap:10px;
        grid-template-rows: 80px 200px 50px ;
    }
</style>
<body>
    <div class="container"></div>
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
    <div class="box">7</div>

</body>
</html>
